<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cahier CREM</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Patrick Hand',cursive;}

/* ── UTILITIES ── */
.hidden{display:none!important;}

/* ── APP BACKGROUND ── */
body{
  background:#14532d;
  background-image:
    radial-gradient(circle at 10% 60%,#166534 0%,transparent 55%),
    radial-gradient(circle at 90% 10%,rgba(21,128,61,.13) 0%,transparent 40%);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:14px 10px 32px;
}

/* ── TOP BAR ── */
#top-bar{
  width:100%;max-width:500px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
#nb-title{
  font-family:'Caveat',cursive;font-size:20px;font-weight:700;
  color:#dcfce7;text-shadow:0 1px 4px rgba(0,0,0,.4);
}
.icon-btn{
  background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.25);color:white;
  padding:6px 14px;border-radius:20px;cursor:pointer;
  font-family:'Caveat',cursive;font-size:14px;font-weight:600;
  transition:background .15s;
}
.icon-btn:hover{background:rgba(255,255,255,.28);}

/* ── NOTEBOOK WRAP ── */
#notebook-wrap{width:100%;max-width:500px;display:flex;filter:drop-shadow(0 10px 30px rgba(0,0,0,.55));}

/* ── SPIRAL ── */
#spiral{
  width:30px;display:flex;flex-direction:column;
  align-items:center;padding-top:20px;gap:4px;flex-shrink:0;
}
.ring{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  border:3.5px solid #9ca3af;
  background:linear-gradient(135deg,#e5e7eb,#c0c0c0);
  box-shadow:inset 0 2px 3px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.25);
}

/* ── PAGE ── */
#page{
  flex:1;
  background-color:#fffef3;
  background-image:
    linear-gradient(rgba(176,215,255,.38) 1px,transparent 1px),
    linear-gradient(90deg,rgba(176,215,255,.38) 1px,transparent 1px);
  background-size:16px 16px;
  border-radius:2px 10px 10px 2px;
  padding:16px 16px 20px 56px;
  min-height:520px;max-height:520px;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
#page::before{
  content:'';position:absolute;
  left:42px;top:0;bottom:0;width:2px;
  background:rgba(200,30,30,.45);pointer-events:none;
}

/* page header */
#page-head{display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;}
#ch-title{
  font-family:'Caveat',cursive;font-size:21px;font-weight:700;
  color:#1e3a8a;line-height:32px;flex:1;padding-right:8px;
}
#pg-info{
  font-family:'Caveat',cursive;font-size:13px;
  color:#94a3b8;line-height:32px;white-space:nowrap;
}
#divider{
  flex-shrink:0;height:2px;
  background:linear-gradient(to right,rgba(176,215,255,.7),transparent);
  margin:2px 0 6px;
}

/* scrollable content area */
#page-content{
  flex:1;overflow-y:auto;padding-right:4px;
  scrollbar-width:thin;scrollbar-color:rgba(176,215,255,.5) transparent;
}
#page-content::-webkit-scrollbar{width:4px;}
#page-content::-webkit-scrollbar-track{background:transparent;}
#page-content::-webkit-scrollbar-thumb{background:rgba(176,215,255,.5);border-radius:2px;}

/* content rendering */
.line{line-height:32px;min-height:32px;font-size:15px;color:#1a1a2e;}
.h1{font-family:'Caveat',cursive;font-size:21px;font-weight:700;color:#b91c1c;line-height:32px;}
.h2{font-family:'Caveat',cursive;font-size:17px;font-weight:700;color:#1e3a8a;text-decoration:underline;line-height:32px;}
.content-ul{padding-left:18px;margin:0;}
.content-ol{padding-left:20px;margin:0;}
.content-ul li,.content-ol li{line-height:32px;font-size:15px;color:#1a1a2e;}
.centered{text-align:center;}
.spacer{height:16px;}

#ex-cta{
  display:block;width:fit-content;margin:14px auto 4px;
  background:linear-gradient(135deg,#dc2626,#b91c1c);
  color:white;border:none;padding:9px 26px;border-radius:50px;
  font-family:'Caveat',cursive;font-size:17px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 18px rgba(220,38,38,.5);
  transition:transform .15s,box-shadow .15s;
}
#ex-cta:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(220,38,38,.55);}

/* ── NAV ROW ── */
#nav-row{
  width:100%;max-width:500px;
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;padding:0 2px 0 32px;
}
.nav-circle{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);
  color:white;font-size:18px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:background .15s;
  user-select:none;border:none;
}
.nav-circle:hover:not(:disabled){background:rgba(255,255,255,.28);}
.nav-circle:disabled{opacity:.22;cursor:default;}
#ch-pill{
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);
  border-radius:20px;padding:5px 14px;color:#dcfce7;
  font-family:'Caveat',cursive;font-size:14px;cursor:pointer;text-align:center;
  max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── CHAPTER PICKER ── */
#picker-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);
  display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:12px;
}
#picker-card{
  background:white;border-radius:16px;width:100%;max-width:500px;
  max-height:58vh;overflow-y:auto;padding:16px;
}
#picker-title{
  font-family:'Caveat',cursive;font-size:22px;font-weight:700;
  color:#1e3a8a;margin-bottom:10px;padding-bottom:8px;
  border-bottom:2px solid #e2e8f0;
}
.picker-item{
  padding:12px;border-radius:8px;cursor:pointer;
  font-family:'Caveat',cursive;font-size:17px;color:#1a1a2e;
  transition:background .15s;display:flex;align-items:center;gap:8px;
}
.picker-item:hover{background:#f1f5f9;}
.picker-item.active{background:#eff6ff;color:#1e3a8a;font-weight:700;}
.picker-num{font-size:13px;color:#94a3b8;font-family:'Patrick Hand',cursive;}

/* ── EXERCISE SCREEN ── */
#ex-screen{
  width:100%;max-width:500px;
  display:flex;flex-direction:column;
}
#back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
  color:white;padding:6px 18px;border-radius:20px;cursor:pointer;
  font-family:'Caveat',cursive;font-size:15px;font-weight:600;
  margin-bottom:10px;width:fit-content;
}
#ex-page{
  background-color:#fffef3;
  background-image:
    linear-gradient(rgba(176,215,255,.38) 1px,transparent 1px),
    linear-gradient(90deg,rgba(176,215,255,.38) 1px,transparent 1px);
  background-size:16px 16px;
  border-radius:2px 10px 10px 2px;
  padding:16px 16px 24px 56px;
  position:relative;width:100%;
  overflow-y:auto;max-height:580px;
  filter:drop-shadow(0 10px 30px rgba(0,0,0,.55));
}
#ex-page::before{
  content:'';position:absolute;
  left:42px;top:0;bottom:0;width:2px;
  background:rgba(200,30,30,.45);
}
#ex-wrap{display:flex;gap:0;}
#ex-spiral{
  width:30px;display:flex;flex-direction:column;
  align-items:center;padding-top:20px;gap:4px;flex-shrink:0;
  filter:drop-shadow(0 10px 30px rgba(0,0,0,.55));
}
.ex-head{font-family:'Caveat',cursive;font-size:22px;font-weight:700;color:#dc2626;line-height:32px;}
.ex-sub{font-family:'Patrick Hand',cursive;font-size:14px;color:#64748b;margin-bottom:14px;line-height:1.5;}
.q-block{margin-bottom:20px;padding-bottom:14px;border-bottom:1.5px dashed rgba(176,215,255,.8);}
.q-num{font-family:'Caveat',cursive;font-size:16px;font-weight:700;color:#1e3a8a;line-height:32px;}
.q-text{font-family:'Patrick Hand',cursive;font-size:15px;line-height:1.7;color:#1a1a2e;margin-bottom:8px;}
.ans-input{
  width:100%;background:transparent;border:none;
  border-bottom:2px solid rgba(176,215,255,.8);
  padding:4px 0;font-family:'Patrick Hand',cursive;font-size:15px;
  color:#1a1a2e;outline:none;resize:none;min-height:64px;
  line-height:28px;
}
.ans-input:focus{border-bottom-color:#1e3a8a;}
.row-btns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.btn-grade{
  background:#1e3a8a;color:white;border:none;padding:6px 18px;
  border-radius:20px;font-family:'Caveat',cursive;font-size:14px;font-weight:600;cursor:pointer;
}
.btn-correction{
  background:transparent;border:2px dashed #f59e0b;color:#92400e;
  padding:6px 16px;border-radius:20px;
  font-family:'Caveat',cursive;font-size:14px;font-weight:600;cursor:pointer;
}
.grade-chip{
  background:linear-gradient(135deg,#16a34a,#15803d);color:white;
  padding:4px 14px;border-radius:20px;
  font-family:'Caveat',cursive;font-size:16px;font-weight:700;
  box-shadow:0 2px 10px rgba(22,163,74,.4);
}
.feedback-box{
  background:rgba(239,246,255,.85);border-left:3px solid #3b82f6;
  border-radius:0 8px 8px 0;padding:8px 12px;margin-top:8px;
  font-family:'Patrick Hand',cursive;font-size:14px;line-height:1.65;color:#1e3a8a;
}
.correction-box{
  background:rgba(255,243,205,.95);border-left:3px solid #f59e0b;
  border-radius:0 8px 8px 0;padding:8px 12px;margin-top:8px;
  font-family:'Patrick Hand',cursive;font-size:14px;line-height:1.7;color:#78350f;
}

/* ── CODE GATE ── */
#gate-screen{
  width:100%;max-width:440px;
  display:flex;flex-direction:column;align-items:center;
  padding-top:20px;
}
#gate-card{
  background-color:#fffef3;
  background-image:
    linear-gradient(rgba(176,215,255,.38) 1px,transparent 1px),
    linear-gradient(90deg,rgba(176,215,255,.38) 1px,transparent 1px);
  background-size:16px 16px;
  border-radius:2px 12px 12px 2px;
  padding:26px 22px 28px 56px;
  width:100%;position:relative;
  box-shadow:0 16px 50px rgba(0,0,0,.45);
}
#gate-card::before{
  content:'';position:absolute;
  left:42px;top:0;bottom:0;width:2px;
  background:rgba(200,30,30,.45);
}
#gate-spiral{
  width:30px;position:absolute;left:0;top:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;
  padding-top:20px;gap:4px;
}
.gate-title{
  font-family:'Caveat',cursive;font-size:28px;font-weight:700;
  color:#1e3a8a;line-height:32px;margin-bottom:4px;
}
.gate-sub{
  font-family:'Patrick Hand',cursive;font-size:14px;color:#64748b;
  margin-bottom:22px;line-height:1.5;
}
.gate-label{
  font-family:'Caveat',cursive;font-size:16px;font-weight:600;
  color:#374151;margin-bottom:6px;display:block;
}
#code-input{
  width:100%;border:2px solid #e2e8f0;border-radius:8px;
  padding:12px 14px;font-size:16px;font-family:'Caveat',cursive;
  letter-spacing:2px;font-weight:600;text-transform:uppercase;
  background:white;color:#1a1a2e;outline:none;
  transition:border-color .2s;margin-bottom:6px;
}
#code-input:focus{border-color:#1e3a8a;}
#gate-hint{
  font-family:'Patrick Hand',cursive;font-size:12px;color:#94a3b8;
  margin-bottom:20px;line-height:1.4;
}
#btn-access{
  width:100%;background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;border:none;padding:13px;border-radius:8px;
  font-family:'Caveat',cursive;font-size:19px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(30,58,138,.4);
  transition:opacity .15s;
}
#btn-access:disabled{opacity:.55;cursor:default;}
#gate-error{
  background:#fee2e2;color:#b91c1c;padding:10px 12px;
  border-radius:8px;font-family:'Patrick Hand',cursive;font-size:14px;
  margin-top:12px;display:none;
}
#gate-expire{
  font-family:'Patrick Hand',cursive;font-size:12px;color:#10b981;
  margin-top:8px;display:none;
}

/* ── SPINNERS ── */
.spinner{
  width:28px;height:28px;border:3px solid rgba(30,58,138,.15);
  border-top-color:#1e3a8a;border-radius:50%;
  animation:spin .7s linear infinite;margin:32px auto;
}
.mini-spin{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);border-top-color:white;
  border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

.err-box{
  background:#fee2e2;color:#b91c1c;padding:10px 12px;
  border-radius:8px;font-family:'Patrick Hand',cursive;font-size:14px;margin:8px 0;
}
</style>
</head>
<body>

<!-- ═══════════════ CODE GATE ═══════════════ -->
<div id="gate-screen">
  <div style="font-family:'Caveat',cursive;font-size:22px;font-weight:700;color:#dcfce7;margin-bottom:16px;text-shadow:0 1px 4px rgba(0,0,0,.4);">
    📓 Cahier CREM
  </div>
  <div style="display:flex;width:100%;max-width:440px;filter:drop-shadow(0 10px 30px rgba(0,0,0,.55));">
    <div id="gate-spiral"></div>
    <div id="gate-card">
      <div class="gate-title">Accès au Cahier</div>
      <div class="gate-sub">Entre ton code d'accès pour ouvrir le cahier de cours.</div>
      <label class="gate-label">🔑 Code d'accès</label>
      <input id="code-input" type="text" placeholder="CREM-XXXXXXXX" maxlength="20" />
      <div id="gate-hint">Ton accès sera sauvegardé automatiquement jusqu'à expiration.</div>
      <button id="btn-access" onclick="validateCode()">📂 Ouvrir le cahier</button>
      <div id="gate-error">⚠ Code invalide ou expiré. Vérifie ton code.</div>
      <div id="gate-expire"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ TOP BAR (notebook) ═══════════════ -->
<div id="top-bar" class="hidden">
  <span id="nb-title">📓 Cahier CREM</span>
  <button class="icon-btn" onclick="logout()">🔓 Déconnexion</button>
</div>

<!-- ═══════════════ NOTEBOOK ═══════════════ -->
<div id="notebook-section" class="hidden" style="width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;">
  <div id="notebook-wrap">
    <div id="spiral"></div>
    <div id="page">
      <div id="page-head">
        <div id="ch-title">Chargement...</div>
        <div id="pg-info"></div>
      </div>
      <div id="divider"></div>
      <div id="page-content">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
  <div id="nav-row">
    <button class="nav-circle" id="btn-prev" onclick="navigate(-1)">◀</button>
    <div id="ch-pill" onclick="openPicker()">Chapitres</div>
    <button class="nav-circle" id="btn-next" onclick="navigate(1)">▶</button>
  </div>
</div>

<!-- ═══════════════ EXERCISE SCREEN ═══════════════ -->
<div id="ex-screen" class="hidden">
  <button id="back-btn" onclick="backToNotebook()">← Retour au cours</button>
  <div id="ex-wrap">
    <div id="ex-spiral"></div>
    <div id="ex-page">
      <div class="ex-head">✏️ Exercices</div>
      <div class="ex-sub" id="ex-ch-name"></div>
      <div id="ex-content"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ═══════════════ CHAPTER PICKER ═══════════════ -->
<div id="picker-bg" class="hidden" onclick="closePicker()">
  <div id="picker-card" onclick="event.stopPropagation()">
    <div id="picker-title">📚 Chapitres</div>
    <div id="picker-list"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────
const COURSES_URL  = 'https://raw.githubusercontent.com/ndiayejoseph123-code/Crem/main/Crem.json';
const CODES_URL    = 'https://raw.githubusercontent.com/ndiayejoseph123-code/Crem/main/Code%20cahier.json';
const AI_ENDPOINT  = '/api/ai'; // Netlify function

const LS_KEY = 'crem_access';
const RINGS  = 15;

// ─────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────
let courses    = [];
let chapterIdx = 0;

// ─────────────────────────────────────────────────
//  SPIRAL BUILDER
// ─────────────────────────────────────────────────
function buildSpirals() {
  ['spiral','gate-spiral','ex-spiral'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 0; i < RINGS; i++) {
      const r = document.createElement('div');
      r.className = 'ring';
      el.appendChild(r);
    }
  });
}

// ─────────────────────────────────────────────────
//  CONTENT RENDERER
// ─────────────────────────────────────────────────
function formatInline(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/__([^_]+)__/g,'<u>$1</u>')
    .replace(/\{r\}([^{]+)\{\/r\}/g,'<span style="color:#dc2626">$1</span>');
}

function renderContent(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inUl = false, inOl = false;

  for (let line of lines) {
    const isBullet  = line.startsWith('- ');
    const isNumbered= /^\d+\.\s/.test(line);

    if (!isBullet && inUl)  { html += '</ul>'; inUl = false; }
    if (!isNumbered && inOl){ html += '</ol>'; inOl = false; }

    if (line === '') {
      html += '<div class="spacer"></div>';
    } else if (line.startsWith('# ')) {
      html += `<div class="h1">${formatInline(line.slice(2))}</div>`;
    } else if (line.startsWith('## ')) {
      html += `<div class="h2">${formatInline(line.slice(3))}</div>`;
    } else if (isBullet) {
      if (!inUl) { html += '<ul class="content-ul">'; inUl = true; }
      html += `<li>${formatInline(line.slice(2))}</li>`;
    } else if (isNumbered) {
      if (!inOl) { html += '<ol class="content-ol">'; inOl = true; }
      html += `<li>${formatInline(line.replace(/^\d+\.\s/,''))}</li>`;
    } else {
      const centerMatch = line.match(/^\{c\}(.*)\{\/c\}$/);
      if (centerMatch) {
        html += `<div class="line centered">${formatInline(centerMatch[1])}</div>`;
      } else {
        html += `<div class="line">${formatInline(line)}</div>`;
      }
    }
  }
  if (inUl) html += '</ul>';
  if (inOl) html += '</ol>';
  return html;
}

// ─────────────────────────────────────────────────
//  CODE GATE
// ─────────────────────────────────────────────────
function checkStoredCode() {
  try {
    const stored = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (!stored) return false;
    const today = new Date().toISOString().split('T')[0];
    if (stored.expiration >= today) return true;
    localStorage.removeItem(LS_KEY); // expired
    return false;
  } catch { return false; }
}

async function validateCode() {
  const input = document.getElementById('code-input');
  const btn   = document.getElementById('btn-access');
  const errEl = document.getElementById('gate-error');
  const expEl = document.getElementById('gate-expire');
  const code  = input.value.trim().toUpperCase();

  if (!code) return;
  btn.disabled = true;
  btn.textContent = 'Vérification...';
  errEl.style.display = 'none';
  expEl.style.display = 'none';

  try {
    const res  = await fetch(CODES_URL + '?t=' + Date.now());
    const data = await res.json();
    const today = new Date().toISOString().split('T')[0];

    const found = (data.codes || []).find(c =>
      c.code.toUpperCase() === code && c.expiration >= today
    );

    if (!found) {
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '📂 Ouvrir le cahier';
      return;
    }

    // Store in localStorage
    localStorage.setItem(LS_KEY, JSON.stringify({
      code: found.code,
      expiration: found.expiration
    }));

    expEl.textContent = `✓ Accès valide jusqu'au ${found.expiration}`;
    expEl.style.display = 'block';

    setTimeout(() => initNotebook(), 600);

  } catch {
    errEl.textContent = '⚠ Impossible de vérifier le code. Vérifie ta connexion.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '📂 Ouvrir le cahier';
  }
}

// Enter key on code input
document.getElementById('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') validateCode();
});

function logout() {
  if (confirm('Déconnexion ? Tu devras rentrer ton code la prochaine fois.')) {
    localStorage.removeItem(LS_KEY);
    location.reload();
  }
}

// ─────────────────────────────────────────────────
//  NOTEBOOK INIT
// ─────────────────────────────────────────────────
async function initNotebook() {
  // Hide gate, show notebook
  document.getElementById('gate-screen').classList.add('hidden');
  document.getElementById('top-bar').classList.remove('hidden');
  document.getElementById('notebook-section').classList.remove('hidden');

  try {
    const res  = await fetch(COURSES_URL + '?t=' + Date.now());
    const data = await res.json();
    courses = data.chapitres || [];

    if (data.titre) document.getElementById('nb-title').textContent = '📓 ' + data.titre;

    if (courses.length === 0) {
      document.getElementById('page-content').innerHTML =
        '<div class="err-box">Aucun chapitre trouvé dans Crem.json</div>';
      return;
    }

    renderChapter(0);
  } catch {
    document.getElementById('page-content').innerHTML =
      '<div class="err-box">⚠ Impossible de charger les cours. Vérifie ta connexion.</div>';
  }
}

// ─────────────────────────────────────────────────
//  CHAPTER RENDER
// ─────────────────────────────────────────────────
function renderChapter(idx) {
  chapterIdx = idx;
  const ch = courses[idx];
  if (!ch) return;

  document.getElementById('ch-title').textContent = ch.titre || 'Sans titre';
  document.getElementById('pg-info').textContent  = `${idx + 1}/${courses.length}`;
  document.getElementById('ch-pill').textContent  =
    ch.titre?.length > 22 ? ch.titre.slice(0, 22) + '…' : ch.titre;

  document.getElementById('page-content').innerHTML =
    renderContent(ch.contenu || '') +
    `<button id="ex-cta" onclick="startExercise()">✏️ Donne-moi un exercice</button>`;

  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === courses.length - 1;
}

function navigate(dir) {
  const next = chapterIdx + dir;
  if (next >= 0 && next < courses.length) renderChapter(next);
}

// ─────────────────────────────────────────────────
//  CHAPTER PICKER
// ─────────────────────────────────────────────────
function openPicker() {
  const list = document.getElementById('picker-list');
  list.innerHTML = '';
  courses.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'picker-item' + (i === chapterIdx ? ' active' : '');
    item.innerHTML = `<span class="picker-num">${i + 1}.</span>${ch.titre}`;
    item.onclick = () => { renderChapter(i); closePicker(); };
    list.appendChild(item);
  });
  document.getElementById('picker-bg').classList.remove('hidden');
}
function closePicker() {
  document.getElementById('picker-bg').classList.add('hidden');
}

// ─────────────────────────────────────────────────
//  EXERCISE GENERATION
// ─────────────────────────────────────────────────
async function startExercise() {
  const ch = courses[chapterIdx];
  document.getElementById('notebook-section').classList.add('hidden');
  document.getElementById('ex-screen').classList.remove('hidden');
  document.getElementById('ex-ch-name').textContent =
    ch.titre + ' — réponds puis clique sur Corriger';
  document.getElementById('ex-content').innerHTML = '<div class="spinner"></div>';

  try {
    const res  = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'exercises',
        chapter_title:   ch.titre,
        chapter_content: ch.contenu
      })
    });
    const data = await res.json();
    if (data.error || !data.questions) throw new Error();
    renderExercises(data.questions);
  } catch {
    document.getElementById('ex-content').innerHTML =
      '<div class="err-box">⚠ Erreur de génération. Vérifie ta connexion Netlify/Mistral.</div>';
  }
}

function renderExercises(questions) {
  let html = '';
  questions.forEach((q, i) => {
    html += `
    <div class="q-block" id="qblock-${i}">
      <div class="q-num">Question ${i + 1}</div>
      <div class="q-text">${escapeHtml(q.question)}</div>
      <textarea class="ans-input" id="ans-${i}" placeholder="✍ Ta réponse ici..."></textarea>
      <div class="row-btns">
        <button class="btn-grade" onclick="gradeAnswer(${i}, ${JSON.stringify(q.question).replace(/</g,'&lt;')}, ${JSON.stringify(q.correction).replace(/</g,'&lt;')})">
          ✔ Corriger
        </button>
        <button class="btn-correction" id="corr-btn-${i}" onclick="toggleCorrection(${i})">
          👁 Voir la correction
        </button>
      </div>
      <div id="grade-${i}" style="display:none"></div>
      <div class="correction-box" id="corr-${i}" style="display:none">
        📌 <strong>Correction :</strong> ${escapeHtml(q.correction)}
      </div>
    </div>`;
  });
  document.getElementById('ex-content').innerHTML = html;
}

function toggleCorrection(i) {
  const box = document.getElementById(`corr-${i}`);
  const btn = document.getElementById(`corr-btn-${i}`);
  const hidden = box.style.display === 'none';
  box.style.display = hidden ? 'block' : 'none';
  btn.textContent   = hidden ? '🙈 Cacher' : '👁 Voir la correction';
}

async function gradeAnswer(i, question, correction) {
  const answer = document.getElementById(`ans-${i}`).value.trim();
  if (!answer) return;
  const gradeEl = document.getElementById(`grade-${i}`);
  gradeEl.style.display = 'block';
  gradeEl.innerHTML = '<div class="mini-spin"></div>';

  try {
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'grade', question, correction, answer })
    });
    const data = await res.json();
    gradeEl.innerHTML = `
      <div class="row-btns" style="margin-top:6px">
        <span class="grade-chip">${data.note}/10</span>
      </div>
      <div class="feedback-box">💬 ${escapeHtml(data.feedback || '')}</div>`;
  } catch {
    gradeEl.innerHTML = '<div class="err-box">Erreur de correction.</div>';
  }
}

function backToNotebook() {
  document.getElementById('ex-screen').classList.add('hidden');
  document.getElementById('notebook-section').classList.remove('hidden');
}

// ─────────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────────
function escapeHtml(str = '') {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────
buildSpirals();

if (checkStoredCode()) {
  // Skip gate, go straight to notebook
  document.getElementById('gate-screen').classList.add('hidden');
  initNotebook();
} else {
  document.getElementById('gate-screen').style.display = 'flex';
}
</script>

</html>
